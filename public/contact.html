<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Form</title>
</head>
<body>
  <!-- Hidden form for Netlify Forms detection at build time. Same name/fields as LeadForm. -->
  <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" style="display: none;">
    <input type="hidden" name="form-name" value="contact" />
    <p class="hidden"><label>Don't fill: <input name="bot-field" /></label></p>
    <input type="text" name="firstName" />
    <input type="text" name="lastName" />
    <input type="text" name="company" />
    <input type="email" name="email" />
    <textarea name="goals"></textarea>
    <input type="checkbox" name="consent" />
  </form>
</body>
</html>
