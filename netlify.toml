[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Netlify Forms Configuration
# Forms are automatically handled by Netlify
# E-Mail bei Kontaktanfrage: Netlify Function send-email nutzt Resend.
# In Netlify: Site → Environment variables → RESEND_API_KEY (API Key von resend.com)
# Optional: FROM_EMAIL z. B. "ConnectingTheDots <noreply@connectingthe.de>" (Domain in Resend verifizieren)

# Decap CMS Configuration
# Git Gateway is enabled via Netlify Identity in the Netlify Dashboard
# Go to: Site Settings → Identity → Enable Identity
# Then: Site Settings → Identity → Services → Git Gateway → Enable Git Gateway

# Headers Configuration
# Custom headers are defined in public/_headers

